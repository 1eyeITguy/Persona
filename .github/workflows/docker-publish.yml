name: Build and Publish Docker Image

# Triggers:
#   - Push to main branch (publishes :latest tag)
#   - New release tag like v0.2.0 (publishes :v0.2.0 and :latest)
#   - Manual trigger from the Actions tab

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    # Required for pushing to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Check out the repo ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (multi-platform builds) ───────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to GitHub Container Registry ────────────────────────
      #   Uses GITHUB_TOKEN — no secrets to configure, works automatically
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Generate image tags and labels ─────────────────────────────
      #   On main push:   ghcr.io/user/persona:latest
      #   On v0.2.0 tag:  ghcr.io/user/persona:v0.2.0
      #                   ghcr.io/user/persona:latest
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Persona
            org.opencontainers.image.description=Open-source help desk tool for hybrid AD + Entra environments
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      # ── 5. Build and push the image ───────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Print image digest for verification ────────────────────────
      - name: Image digest
        run: echo "Published ${{ steps.meta.outputs.tags }}"
