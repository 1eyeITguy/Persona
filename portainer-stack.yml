services:
  persona:
    image: ghcr.io/1eyeitguy/persona:dev
    container_name: persona
    restart: unless-stopped
    ports:
      - "8123:8000"
    volumes:
      - persona_data:/app/data
    environment:
      JWT_SECRET: "e178cc53c0a6a7bb338eb84307efd86aa9394e827e1c303886c11c761a438d10"
      JWT_EXPIRE_MINUTES: "480"
      CORS_ORIGINS: '["http://YOUR-SERVER-IP:8123"]'
    networks:
      - persona_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  persona_data:

networks:
  persona_net:
    driver: bridge
